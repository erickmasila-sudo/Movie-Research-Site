<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="feedback.css">
</head>

<body>
 <header>
        <nav>
            <a href="index.html">Movie Research</a>
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="menu-btn">&#9776;</label>
            <div class="menu">
                <a href="filter.html">Filter</a>
                <a href="advanced-filter.html">Advanced Filter</a>
                <a href="feedback.html">Feedback</a>
                <a href="favorites.html">Favourite</a>
            </div>
        </nav>
    </header>
    <main>
            <section id="feedback-section" class="container">
            <h1>We Value Your Feedback</h1>
            <p>Tell us about your experience using the Movie Research Site.</p>
            <form id="feedback-form">
                <div class="form-group">
                    <label for="feedback-category">Feedback Topic:</label>
                    <select id="feedback-category" name="feedback-category">
                        <option value="general">General Inquiry</option>
                        <option value="bug">Report a Bug</option>
                        <option value="feature">Feature Request</option>
                        <option value="movie-data">Movie Data Accuracy</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="user-message">Message:</label>
                    <textarea id="user-message" name="user-message" rows="5" required placeholder="How can we improve?"></textarea>
                </div>

                <button type="button" onclick="saveFeedback()" class="submit-btn">Submit Feedback</button>
            </form>
        </section>
    </body>
</main>
  <footer>
        <p>&copy; 2026 Movie Research Website. All rights reserved</p>
    </footer>
    <script src="feedback.js"></script>
</html>
