<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="index.css">

<body>
 <header>
        <nav>
            <a href="index.html">Movie Research</a>
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="menu-btn">&#9776;</label>
            <div class="menu">
                <a href="filter.html">Filter</a>
                <a href="advanced-filter.html">Advanced Filter</a>

            </div>
        </nav>

<h1>Filter Movies</h1>
    <p>Use the filters below to narrow down your movie search by Genre:</p>
<div class="search-wrapper">
        <input type="text" id="search" placeholder="Search movies..." />
    </div>
    
    <div class="filter-section">
        <label for="Genre ">Genre </label>
        <select id="genre" name="genre">
            <option value="">All</option>
            <option>Action</option>
            <option>Adventure</option>
            <option>Animation</option>
            <option>Biography</option>
            <option>Comedy</option>
            <option>Crime</option>
            <option>Documentary</option>
            <option>Drama</option>
            <option>Family</option>
            <option>Fantasy</option>
            <option>History</option>
            <option>Horror</option>
            <option>Music</option>
            <option>Musical</option>
            <option>Mystery</option>
            <option>Romance</option>
            <option>Sci-Fi</option>
            <option>Sport</option>
            <option>Thriller</option>
            <option>War</option>
            <option>Western</option>
        </select>
    </div>
    <button onclick="loadMoviesByGenre()">Load Movies</button>

    <div id="Movie-holder">
        <!-- Filtered movies will be displayed here -->
    </div>
</body>
