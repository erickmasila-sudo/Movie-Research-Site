 <h1>Advanced Filter Movies</h1>
    <p>Use the filters below to narrow down your movie search by Genre, Release Year, and Rating:</p>
  
<div class="search-wrapper">
<input type="text" placeholder="Search for movies..." id="search">
</div>
     <div class="filter-section">
        <label for="genre">Genre:</label>
        <select id="genre" name="genre">
            <option value="">All</option>
             <option>Action</option>
            <option>Adventure</option>
            <option>Animation</option>
            <option>Biography</option>
            <option>Comedy</option>
            <option>Crime</option>
            <option>Documentary</option>
            <option>Drama</option>
            <option>Family</option>
            <option>Fantasy</option>
            <option>History</option>
            <option>Horror</option>
            <option>Music</option>
            <option>Musical</option>
            <option>Mystery</option>
            <option>Romance</option>
            <option>Sci-Fi</option>
            <option>Sport</option>
            <option>Thriller</option>
            <option>War</option>
            <option>Western</option>
        </select>
    </div>
    <div class="filter-section">
        <label for="release-year">Release Year:</label>
        <select id="release-year" name="release-year">
        <option value="">All</option>
        </select>
    </div>
    <div class="filter-section">
        <label for="rating">Rating:</label>
        <select id="rating" name="rating">
        <option value="">All</option>
            </select>
    </div>
    <button onclick="getMovie()">Search</button>
    <div id="Movie-holder">
        <!-- Filtered movies will be displayed here -->
    </div>
</body>
